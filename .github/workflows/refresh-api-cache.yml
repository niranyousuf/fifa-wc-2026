name: Refresh API cache

on:
  schedule:
    # Every 6 hours (UTC) — push triggers a new Vercel production deploy.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-api-cache
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Warm API cache from Zafronix
        shell: bash
        env:
          SECRET_KEY: ${{ secrets.ZAFRONIX_API_KEY }}
          VAR_KEY: ${{ vars.ZAFRONIX_API_KEY }}
          WC_YEAR: "2026"
        run: |
          set -euo pipefail
          export ZAFRONIX_API_KEY="$SECRET_KEY"

          if [[ -z "$ZAFRONIX_API_KEY" && -n "$VAR_KEY" ]]; then
            echo "::warning::Using Actions *Variables* for ZAFRONIX_API_KEY. Move it to Repository *secrets* (public repos expose Variables)."
            export ZAFRONIX_API_KEY="$VAR_KEY"
          fi

          if [[ -z "$ZAFRONIX_API_KEY" ]]; then
            echo "::error::Add one repository secret: ZAFRONIX_API_KEY"
            echo "::error::Settings → Secrets and variables → Actions → Secrets tab → Repository secrets → New repository secret"
            echo "::error::Vercel env vars do not sync to GitHub automatically."
            exit 1
          fi

          echo "Zafronix key resolved for CI (length ${#ZAFRONIX_API_KEY})."
          npm run cache:warm

      - name: Commit and push cache (deploy via Vercel)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/api-cache/teams data/api-cache/standings data/api-cache/matches
          if git diff --staged --quiet; then
            echo "Cache unchanged — no commit needed."
            exit 0
          fi
          git commit -m "chore: refresh API cache from Zafronix"
          git push origin HEAD:main
