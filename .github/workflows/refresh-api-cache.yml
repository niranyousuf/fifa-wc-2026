name: Refresh API cache

on:
  schedule:
    # Every 6 hours (UTC) — push triggers a new Vercel production deploy.
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-api-cache
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve API keys (repository secrets)
        id: keys
        shell: bash
        env:
          SECRET_KEY: ${{ secrets.ZAFRONIX_API_KEY }}
          SECRET_KEYS: ${{ secrets.ZAFRONIX_API_KEYS }}
        run: |
          if [[ -z "$SECRET_KEY" && -z "$SECRET_KEYS" ]]; then
            echo "::error::No API key found for GitHub Actions."
            echo "::error::Go to github.com/niranyousuf/fifa-wc-2026 → Settings → Secrets and variables → Actions → Repository secrets (NOT Variables, NOT Environments-only)."
            echo "::error::Add secret name exactly: ZAFRONIX_API_KEY (value = your Zafronix key). Optional: ZAFRONIX_API_KEYS for extra keys."
            echo "::error::Vercel env vars do NOT apply here — you must add the key separately in GitHub."
            exit 1
          fi
          echo "Zafronix key configured (length ${#SECRET_KEY}, extra keys list length ${#SECRET_KEYS})."

      - name: Warm API cache from Zafronix
        env:
          ZAFRONIX_API_KEY: ${{ secrets.ZAFRONIX_API_KEY }}
          ZAFRONIX_API_KEYS: ${{ secrets.ZAFRONIX_API_KEYS }}
          WC_YEAR: "2026"
        run: npm run cache:warm

      - name: Commit and push cache (deploy via Vercel)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/api-cache/teams data/api-cache/standings data/api-cache/matches
          if git diff --staged --quiet; then
            echo "Cache unchanged — no commit needed."
            exit 0
          fi
          git commit -m "chore: refresh API cache from Zafronix"
          git push origin HEAD:main
